spring.application.name=admision

spring.datasource.url=jdbc:mysql://localhost:3306/admision_db
spring.datasource.username=
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


server.port=8080

app.storage.excels=uploads/excels
app.storage.pdfs=uploads/pdfs

app.storage.evidencias=uploads/evidencias
app.storage.imagenes=uploads/imagenes
